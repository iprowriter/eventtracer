<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EventTracer — live</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    header { padding: 12px 20px; background: #1e293b; display: flex; align-items: center; gap: 12px; }
    h1 { font-size: 16px; margin: 0; }
    #status { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: #475569; }
    #status.on { background: #16a34a; }
    #sagas { display: flex; gap: 16px; padding: 20px; overflow-x: auto; align-items: flex-start; }
    .saga { background: #1e293b; border: 1px solid #334155; border-radius: 10px; min-width: 300px; }
    .saga h2 { font-size: 12px; margin: 0; padding: 10px 12px; border-bottom: 1px solid #334155;
               color: #94a3b8; font-family: monospace; }
    .event { padding: 10px 12px; border-bottom: 1px solid #334155; }
    .event:last-child { border-bottom: none; }
    .event.dlq { background: #3b1418; }
    .event.dlq .type { color: #fca5a5; }
    .event.replayed { opacity: 0.75; }
    .event.replayed .type::after { content: ' ↻ replay'; font-size: 10px; font-weight: 600;
                                   color: #a78bfa; }
    header button { font-size: 12px; font-family: inherit; cursor: pointer; color: #e2e8f0;
                    background: #334155; border: 1px solid #475569; border-radius: 6px;
                    padding: 4px 10px; }
    header button:hover { background: #475569; }
    header button:disabled { opacity: 0.5; cursor: default; }
    .spacer { flex: 1; }
    .type { font-weight: 600; color: #38bdf8; }
    .meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    pre { margin: 6px 0 0; font-size: 11px; color: #cbd5e1; white-space: pre-wrap; }
    .empty { padding: 40px; color: #64748b; }
    #services { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 20px;
                background: #16203a; border-bottom: 1px solid #334155; }
    .svc { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: monospace;
           background: #1e293b; border: 1px solid #334155; border-radius: 999px; padding: 4px 10px; }
    .svc .dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; }
    .svc.up .dot { background: #16a34a; }
    .svc.down .dot { background: #dc2626; }
    .svc.down .name { color: #fca5a5; }
    .svc .lag { color: #64748b; }
    .svc.lagging .lag { color: #f59e0b; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>EventTracer — live event stream</h1>
    <span id="status">connecting…</span>
    <span class="spacer"></span>
    <button id="replay" title="Re-read every topic from offset 0 and rebuild the timeline from the log">↻ Replay log</button>
    <button id="clear" title="Clear the board">Clear</button>
  </header>
  <div id="services"></div>
  <div id="sagas"><div class="empty">Waiting for events… POST an order to the gateway.</div></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const sagas = document.getElementById('sagas');
    const statusEl = document.getElementById('status');
    const servicesEl = document.getElementById('services');
    const columns = new Map(); // correlationId -> events container
    const svcEls = new Map();  // service name -> chip element

    const socket = io('http://localhost:4000');

    socket.on('connect', () => {
      statusEl.textContent = 'connected';
      statusEl.classList.add('on');
    });
    socket.on('disconnect', () => {
      statusEl.textContent = 'disconnected';
      statusEl.classList.remove('on');
    });

    // The monitor emits 'status' every ~2s with each service's consumer health.
    // Kill a service and watch its dot go red and its lag climb; restart it and
    // the lag drains back to 0.
    socket.on('status', (list) => {
      for (const s of list) {
        let el = svcEls.get(s.service);
        if (!el) {
          el = document.createElement('div');
          el.className = 'svc';
          el.innerHTML =
            '<span class="dot"></span><span class="name"></span><span class="lag"></span>';
          servicesEl.appendChild(el);
          svcEls.set(s.service, el);
        }
        el.classList.toggle('up', s.status === 'up');
        el.classList.toggle('down', s.status === 'down');
        el.classList.toggle('lagging', s.lag > 0);
        el.querySelector('.name').textContent = s.service;
        el.querySelector('.lag').textContent = 'lag ' + s.lag;
      }
    });

    // The monitor emits 'event' with the full envelope. Group by correlationId
    // so every step of one order/saga lands in the same column.
    socket.on('event', (envelope) => {
      const empty = sagas.querySelector('.empty');
      if (empty) empty.remove();

      let col = columns.get(envelope.correlationId);
      if (!col) {
        const card = document.createElement('div');
        card.className = 'saga';
        const title = document.createElement('h2');
        title.textContent = envelope.correlationId;
        card.appendChild(title);
        col = document.createElement('div');
        card.appendChild(col);
        sagas.appendChild(card);
        columns.set(envelope.correlationId, col);
      }

      const ev = document.createElement('div');
      ev.className = 'event';
      // Dead-letter events (eventType ends in .DLQ) get the red treatment.
      if (envelope.eventType.endsWith('.DLQ')) ev.classList.add('dlq');
      // Events re-pushed by the replay endpoint are dimmed and badged.
      if (envelope.replayed) ev.classList.add('replayed');
      ev.innerHTML =
        '<div class="type">' + envelope.eventType + '</div>' +
        '<div class="meta">' + new Date(envelope.occurredAt).toLocaleTimeString() +
        ' · eventId ' + envelope.eventId.slice(0, 8) + '</div>' +
        '<pre>' + JSON.stringify(envelope.payload, null, 2) + '</pre>';
      col.appendChild(ev);
    });

    // Wipe the board back to its empty state (does not touch Kafka or the log).
    function clearBoard() {
      columns.clear();
      sagas.innerHTML = '<div class="empty">Waiting for events… POST an order to the gateway.</div>';
    }
    document.getElementById('clear').onclick = clearBoard;

    // Replay = POST to the monitor's replay endpoint (NOT to Kafka — the browser
    // never publishes, rule #1). We clear first so the timeline visibly rebuilds
    // purely from the Kafka log: the log is the source of truth, the UI a projection.
    const replayBtn = document.getElementById('replay');
    replayBtn.onclick = async () => {
      replayBtn.disabled = true;
      replayBtn.textContent = '↻ Replaying…';
      clearBoard();
      try {
        const res = await fetch('http://localhost:4000/replay', { method: 'POST' });
        if (!res.ok) throw new Error('replay failed: ' + res.status);
      } catch (err) {
        alert(String(err));
      } finally {
        replayBtn.disabled = false;
        replayBtn.textContent = '↻ Replay log';
      }
    };
  </script>
</body>
</html>
