services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: eventtracer-kafka
    ports:
      - "9092:9092"            # host apps connect here (localhost:9092)
    environment:
      # --- KRaft identity (no Zookeeper, per ADR-005) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      # --- Listeners: use ://:PORT (empty host = bind all interfaces).
      #     Do NOT write 0.0.0.0 here — this image rejects it as an advertised addr. ---
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:19092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Single-broker settings (can't replicate beyond 1 node) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    container_name: eventtracer-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eventtracer
      POSTGRES_PASSWORD: eventtracer
      POSTGRES_DB: eventtracer
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Runs ONLY on a fresh data volume (first boot). Creates per-service schemas.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventtracer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kafka-data:
  postgres-data: