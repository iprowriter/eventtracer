# --- Shared config for the seven NestJS apps -------------------------------
# They all run the SAME image (built once from ./Dockerfile) and differ only by
# the `command:` that picks which bundle to run. The apps live behind the `apps`
# compose profile, so `docker compose up` still starts ONLY infra (kafka+pg) for
# the usual dev workflow (apps via `npm run start:dev -- <app>`), while
# `docker compose --profile apps up` brings up the whole system. See the Makefile.
x-app-env: &app-env
  # In-network addresses: apps reach Kafka on its INTERNAL listener and Postgres
  # by service name. (On the host, the same code defaults to localhost:9092.)
  KAFKA_BROKER: kafka:19092
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: eventtracer
  POSTGRES_PASSWORD: eventtracer
  POSTGRES_DB: eventtracer

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: eventtracer-app:local # shared tag → image is built once, reused by all
  profiles: ["apps"]
  restart: unless-stopped
  depends_on:
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
  environment: *app-env

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: eventtracer-kafka
    ports:
      - "9092:9092"            # host apps connect here (localhost:9092)
    environment:
      # --- KRaft identity (no Zookeeper, per ADR-005) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      # --- Listeners: use ://:PORT (empty host = bind all interfaces).
      #     Do NOT write 0.0.0.0 here — this image rejects it as an advertised addr. ---
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:19092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Single-broker settings (can't replicate beyond 1 node) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    container_name: eventtracer-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eventtracer
      POSTGRES_PASSWORD: eventtracer
      POSTGRES_DB: eventtracer
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Runs ONLY on a fresh data volume (first boot). Creates per-service schemas.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventtracer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Application services (profile: apps) --------------------------------
  # The two HTTP apps publish ports; the five pure-Kafka services don't.
  api-gateway:
    <<: *app
    container_name: eventtracer-api-gateway
    command: node dist/apps/api-gateway/main
    environment:
      <<: *app-env
      PORT: 5000
    ports:
      - "5000:5000" # public REST surface (POST /orders, /orders/:id/redeliver)

  event-monitor:
    <<: *app
    container_name: eventtracer-event-monitor
    command: node dist/apps/event-monitor/main
    environment:
      <<: *app-env
      PORT: 4000
    ports:
      - "4000:4000" # WebSocket + replay endpoint the UI connects to

  order-service:
    <<: *app
    container_name: eventtracer-order-service
    command: node dist/apps/order-service/main

  payment-service:
    <<: *app
    container_name: eventtracer-payment-service
    command: node dist/apps/payment-service/main

  shipping-service:
    <<: *app
    container_name: eventtracer-shipping-service
    command: node dist/apps/shipping-service/main

  notification-service:
    <<: *app
    container_name: eventtracer-notification-service
    command: node dist/apps/notification-service/main

  refund-service:
    <<: *app
    container_name: eventtracer-refund-service
    command: node dist/apps/refund-service/main

  # The Next.js UI. Built from its own context (not the shared app image). The
  # browser runs on the host, so it reaches the gateway/monitor on localhost via
  # their published ports — the frontend just serves the page on :3001.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: eventtracer-frontend:local
    container_name: eventtracer-frontend
    profiles: ["apps"]
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway
      - event-monitor

volumes:
  kafka-data:
  postgres-data: